version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

    groups:
      production:
        applies-to: version-updates
        dependency-type: production
        patterns:
          - '*'
        update-types:
          - patch
          - minor

      development:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - '*'
        update-types:
          - patch
          - minor

    cooldown:
      default-days: 7

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

    groups:
      docker:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - patch
          - minor

    cooldown:
      default-days: 7
